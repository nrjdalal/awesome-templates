name: auto-canary-into-main

on:
  push:
    branches: ["canary"]
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-canary-into-main:
    name: Auto create PR to merge canary into main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create release PR if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_ERR="$(mktemp)"
          if ! gh api repos/${{ github.repository }}/branches/main >/dev/null 2>"$BRANCH_ERR"; then
            if grep -q "HTTP 404" "$BRANCH_ERR"; then
              echo "No main branch yet. A fork's main is created by the CLI and pushed (git push origin canary main); nothing to release until it exists. Skipping."
              exit 0
            fi
            echo "Failed to check for the main branch:" >&2
            cat "$BRANCH_ERR" >&2
            exit 1
          fi
          AHEAD=$(gh api repos/${{ github.repository }}/compare/main...canary --jq '.ahead_by')
          if [ "$AHEAD" -eq 0 ]; then
            echo "canary has no commits ahead of main. Nothing to release. Skipping."
            exit 0
          fi
          EXISTING=$(gh pr list --head canary --base main --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "Pull request #$EXISTING already exists. Skipping creation."
            exit 0
          fi
          gh pr create --head canary --base main --draft \
            --title "ci(release): 🚀 merge canary into main" \
            --body "This PR was automatically created to merge changes from canary into main.

          > [!IMPORTANT]
          > Merge with a **merge commit** (not squash), so main keeps shared history with canary and future release diffs stay clean."
